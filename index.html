<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Progress Tracker â€” 41 Patterns, 820 Problems</title>
<meta name="description" content="Track your LeetCode progress across 41 coding patterns with 820 problems. Save progress locally, share via URL hash.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--surface:#1c2128;
  --border:#30363d;--border2:#484f58;
  --fg:#e6edf3;--fg2:#8b949e;--fg3:#6e7681;
  --accent:#58a6ff;--accent2:#1f6feb;--accent-glow:rgba(88,166,255,.15);
  --green:#3fb950;--green-dim:rgba(63,185,80,.15);
  --orange:#d29922;--orange-dim:rgba(210,153,34,.15);
  --red:#f85149;--red-dim:rgba(248,81,73,.15);
  --purple:#bc8cff;--purple-dim:rgba(188,140,255,.12);
  --radius:10px;--radius-sm:6px;
  --font:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','Cascadia Code','Fira Code',monospace;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --transition:all .25s cubic-bezier(.4,0,.2,1);
}
@font-face{font-family:'Inter';src:url(data:font/woff2;base64,) format('woff2');font-display:swap}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--fg);
  line-height:1.6;min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(88,166,255,.06) 0%,transparent 60%);
}
a{color:var(--accent);text-decoration:none;transition:var(--transition)}
a:hover{color:#79c0ff;text-decoration:underline}

/* Header */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(13,17,23,.85);backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);padding:16px 0;
}
.header-inner{max-width:1100px;margin:0 auto;padding:0 20px}
.header h1{
  font-size:1.5rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:-.02em;
}
.header-subtitle{color:var(--fg2);font-size:.85rem;margin-top:2px}
.header-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:var(--radius-sm);
  font-size:.8rem;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:var(--bg2);color:var(--fg2);
  transition:var(--transition);font-family:var(--font);
}
.btn:hover{border-color:var(--border2);color:var(--fg);background:var(--bg3)}
.btn-danger{border-color:rgba(248,81,73,.4);color:var(--red)}
.btn-danger:hover{background:var(--red-dim);border-color:var(--red)}
.btn-accent{border-color:var(--accent2);color:var(--accent);background:rgba(31,111,235,.1)}
.btn-accent:hover{background:rgba(31,111,235,.2)}
.search-box{
  flex:1;min-width:200px;padding:7px 12px;
  border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--bg);color:var(--fg);font-size:.85rem;
  font-family:var(--font);outline:none;transition:var(--transition);
}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-box::placeholder{color:var(--fg3)}

/* Global Progress */
.global-progress{
  max-width:1100px;margin:24px auto 0;padding:0 20px;
}
.progress-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 24px;position:relative;overflow:hidden;
}
.progress-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--purple),var(--green));
}
.progress-stats{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.progress-main{display:flex;align-items:baseline;gap:10px}
.progress-count{font-size:2rem;font-weight:700;font-family:var(--mono);color:var(--fg)}
.progress-total{font-size:1rem;color:var(--fg3);font-family:var(--mono)}
.progress-pct{
  font-size:1.4rem;font-weight:700;font-family:var(--mono);
  background:linear-gradient(135deg,var(--green),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.progress-bar-wrap{
  height:8px;background:var(--bg3);border-radius:99px;
  margin-top:14px;overflow:hidden;
}
.progress-bar-fill{
  height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,var(--accent),var(--green));
  box-shadow:0 0 12px rgba(88,166,255,.3);
}
.difficulty-counts{display:flex;gap:16px;flex-wrap:wrap}
.diff-stat{display:flex;align-items:center;gap:5px;font-size:.8rem;font-family:var(--mono)}
.diff-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.diff-dot.easy{background:var(--green)}
.diff-dot.medium{background:var(--orange)}
.diff-dot.hard{background:var(--red)}

/* Main Content */
.main{max-width:1100px;margin:0 auto;padding:20px 20px 60px}

/* Category */
.category{
  margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg2);overflow:hidden;transition:var(--transition);
}
.category:hover{border-color:var(--border2)}
.category-header{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  cursor:pointer;user-select:none;transition:var(--transition);
}
.category-header:hover{background:rgba(255,255,255,.02)}
.category-chevron{
  width:20px;height:20px;color:var(--fg3);transition:transform .3s ease;flex-shrink:0;
}
.category.open .category-chevron{transform:rotate(90deg)}
.category-num{
  font-size:.75rem;font-weight:700;font-family:var(--mono);
  padding:3px 8px;border-radius:4px;
  background:var(--accent-glow);color:var(--accent);min-width:32px;text-align:center;
}
.category-name{font-weight:600;font-size:.95rem;flex:1;color:var(--fg)}
.category-progress{
  display:flex;align-items:center;gap:8px;font-size:.8rem;font-family:var(--mono);color:var(--fg2);
}
.cat-bar-wrap{width:80px;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:99px;transition:width .4s ease;background:var(--accent)}
.cat-bar-fill.complete{background:var(--green)}

/* Problem List */
.problem-list{
  max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);
  border-top:0 solid var(--border);
}
.category.open .problem-list{max-height:3000px;border-top-width:1px}
.problem{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px 10px 50px;
  border-bottom:1px solid rgba(48,54,61,.5);transition:var(--transition);
}
.problem:last-child{border-bottom:none}
.problem:hover{background:rgba(255,255,255,.02)}
.problem.solved{opacity:.55}
.problem.solved .problem-name{text-decoration:line-through;color:var(--fg3)}
.problem-check{
  appearance:none;-webkit-appearance:none;
  width:18px;height:18px;border-radius:4px;
  border:2px solid var(--border2);background:transparent;
  cursor:pointer;transition:var(--transition);flex-shrink:0;
  display:grid;place-content:center;
}
.problem-check::before{
  content:'';width:10px;height:10px;border-radius:2px;
  transform:scale(0);transition:transform .2s ease;
  background:var(--green);
}
.problem-check:checked{border-color:var(--green);background:var(--green-dim)}
.problem-check:checked::before{transform:scale(1)}
.problem-check:hover{border-color:var(--accent)}
.problem-name{flex:1;font-size:.88rem}
.problem-name a{color:var(--fg);transition:var(--transition)}
.problem-name a:hover{color:var(--accent);text-decoration:none}
.problem.solved .problem-name a{color:var(--fg3)}
.diff-badge{
  font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:99px;
  font-family:var(--mono);letter-spacing:.02em;text-transform:uppercase;
}
.diff-badge.easy{background:var(--green-dim);color:var(--green)}
.diff-badge.medium{background:var(--orange-dim);color:var(--orange)}
.diff-badge.hard{background:var(--red-dim);color:var(--red)}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  padding:12px 24px;border-radius:var(--radius);
  background:var(--bg3);border:1px solid var(--border);color:var(--fg);
  font-size:.85rem;z-index:999;transition:transform .3s ease;
  box-shadow:var(--shadow);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  place-items:center;
}
.modal-overlay.show{display:grid}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;width:90%;max-width:400px;box-shadow:var(--shadow);
}
.modal h3{margin-bottom:12px;font-size:1.1rem}
.modal p{color:var(--fg2);font-size:.9rem;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

/* Scroll to top */
.scroll-top{
  position:fixed;bottom:24px;right:24px;z-index:100;
  width:40px;height:40px;border-radius:50%;
  background:var(--accent2);color:#fff;border:none;
  cursor:pointer;display:none;place-content:center;
  box-shadow:0 4px 16px rgba(31,111,235,.4);transition:var(--transition);
  font-size:1.2rem;
}
.scroll-top:hover{transform:scale(1.1);background:var(--accent)}
.scroll-top.show{display:grid}

/* Responsive */
@media(max-width:640px){
  .header h1{font-size:1.2rem}
  .progress-main{flex-direction:column;gap:2px}
  .progress-count{font-size:1.5rem}
  .problem{padding-left:18px}
  .header-actions{flex-direction:column}
  .search-box{min-width:unset;width:100%}
  .cat-bar-wrap{width:50px}
}

/* New Features CSS */
.flag-btn {
  background:transparent;border:none;font-size:1.1rem;cursor:pointer;
  opacity:0.3;transition:var(--transition);padding:0 4px;
  filter:grayscale(100%);
}
.flag-btn:hover { opacity:0.8;filter:grayscale(50%);transform:scale(1.1); }
.flag-btn.active { opacity:1;filter:grayscale(0%);text-shadow:0 0 8px rgba(210,153,34,0.6); }
.problem.flagged { border-left:3px solid var(--orange);padding-left:15px;background:var(--orange-dim); }

.diff-filters { display:flex;gap:8px;margin-top:12px; }
.btn-filter { opacity:0.5;border-color:transparent; }
.btn-filter.active { opacity:1; }
.btn-filter[data-diff="easy"].active { border-color:var(--green);color:var(--green);background:var(--green-dim); }
.btn-filter[data-diff="medium"].active { border-color:var(--orange);color:var(--orange);background:var(--orange-dim); }
.btn-filter[data-diff="hard"].active { border-color:var(--red);color:var(--red);background:var(--red-dim); }

@keyframes flashRow {
  0% { background:transparent; }
  20% { background:rgba(31,111,235,0.4);transform:scale(1.02); }
  100% { background:transparent;transform:scale(1); }
}
.problem.highlight { animation:flashRow 2s ease-out; }

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.category{animation:fadeIn .3s ease both}
</style>
</head>
<body>

<header class="header" id="top">
  <div class="header-inner">
    <h1>&#x1F4BB; LeetCode Progress Tracker</h1>
    <div class="header-subtitle">41 Patterns &bull; 820 Problems &bull; All Free</div>
    <div class="header-actions">
      <input type="text" class="search-box" id="search" placeholder="&#128269; Search problems... (/ to focus)" autocomplete="off">
      <button class="btn" id="expandAll" onclick="toggleAll(true)">&#x25BC; Expand All</button>
      <button class="btn" id="collapseAll" onclick="toggleAll(false)">&#x25B2; Collapse All</button>
      <button class="btn btn-accent" id="randomBtn" onclick="pickRandom()">&#127922; Random Unsolved</button>
      <button class="btn btn-accent" id="shareBtn" onclick="shareProgress()">&#x1F517; Share Progress</button>
      <button class="btn btn-danger" id="resetBtn" onclick="confirmReset()">&#x1F5D1; Reset All</button>
    </div>
    <div class="diff-filters">
      <button class="btn btn-filter active" data-diff="easy" onclick="toggleFilter('easy')">Easy</button>
      <button class="btn btn-filter active" data-diff="medium" onclick="toggleFilter('medium')">Medium</button>
      <button class="btn btn-filter active" data-diff="hard" onclick="toggleFilter('hard')">Hard</button>
    </div>
  </div>
</header>

<div class="global-progress">
  <div class="progress-card">
    <div class="progress-stats">
      <div>
        <div class="progress-main">
          <span class="progress-count" id="globalSolved">0</span>
          <span class="progress-total">/ 820 solved</span>
        </div>
        <div class="difficulty-counts" id="diffCounts"></div>
      </div>
      <div class="progress-pct" id="globalPct">0%</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="globalBar" style="width:0%"></div>
    </div>
  </div>
</div>

<main class="main" id="categoriesContainer"></main>

<div class="toast" id="toast"></div>
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>&#x26A0;&#xFE0F; Reset All Progress?</h3>
    <p>This will clear all your checkmarks. This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="resetAll()">Yes, Reset</button>
    </div>
  </div>
</div>

const KEY = 'lc_progress_v2';
const FLAG_KEY = 'lc_flagged_v2';
let solved = {};
let flagged = {};
let diffFilters = { easy: true, medium: true, hard: true };

function init() {
  loadProgress();
  renderCategories();
  updateGlobalProgress();
  loadFromHash();
  document.getElementById('search').addEventListener('input', applyFilters);
  window.addEventListener('scroll', () => {
    document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
  });
  
  // Keyboard Navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('search').focus();
    } else if (e.key === 'Escape' && document.activeElement.id === 'search') {
      const searchBox = document.getElementById('search');
      searchBox.value = '';
      searchBox.blur();
      applyFilters();
    }
  });
}

function loadProgress() {
  try { solved = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { solved = {}; }
  try { flagged = JSON.parse(localStorage.getItem(FLAG_KEY)) || {}; } catch(e) { flagged = {}; }
}

function saveProgress() {
  localStorage.setItem(KEY, JSON.stringify(solved));
  localStorage.setItem(FLAG_KEY, JSON.stringify(flagged));
}

function getProblemKey(catId, url) { return catId + '::' + url; }

function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';
  DATA.forEach((cat, i) => {
    const catEl = document.createElement('div');
    catEl.className = 'category';
    catEl.id = 'cat-' + cat.id;
    catEl.style.animationDelay = (i * 0.03) + 's';

    const solvedCount = cat.problems.filter(p => solved[getProblemKey(cat.id, p.url)]).length;
    const pct = Math.round((solvedCount / cat.problems.length) * 100);
    const isComplete = solvedCount === cat.problems.length;

    catEl.innerHTML =
      '<div class="category-header" onclick="toggleCategory(' + cat.id + ')">' +
        '<svg class="category-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' +
        '<span class="category-num">' + cat.id + '</span>' +
        '<span class="category-name">' + escHtml(cat.name) + '</span>' +
        '<div class="category-progress">' +
          '<span>' + solvedCount + ' / ' + cat.problems.length + '</span>' +
          '<div class="cat-bar-wrap"><div class="cat-bar-fill' + (isComplete ? ' complete' : '') + '" style="width:' + pct + '%"></div></div>' +
        '</div>' +
      '</div>' +
      '<div class="problem-list" id="plist-' + cat.id + '">' +
        cat.problems.map(p => {
          const key = getProblemKey(cat.id, p.url);
          const checked = solved[key] ? ' checked' : '';
          const solvedClass = solved[key] ? ' solved' : '';
          const flagClass = flagged[key] ? ' flagged' : '';
          const dl = p.d.toLowerCase();
          return '<div class="problem' + solvedClass + flagClass + '" data-key="' + key + '" data-name="' + escAttr(p.name) + '" data-diff="' + dl + '">' +
            '<input type="checkbox" class="problem-check"' + checked + ' onchange="toggleProblem(\'' + escJs(key) + '\',this.checked,' + cat.id + ')">' +
            '<button class="flag-btn' + (flagged[key] ? ' active' : '') + '" onclick="toggleFlag(\'' + escJs(key) + '\')" title="Review Later">&#11088;</button>' +
            '<div class="problem-name"><a href="' + p.url + '" target="_blank" rel="noopener">' + escHtml(p.name) + '</a></div>' +
            '<span class="diff-badge ' + dl + '">' + p.d + '</span>' +
          '</div>';
        }).join('') +
      '</div>';

    container.appendChild(catEl);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function toggleCategory(id) {
  const cat = document.getElementById('cat-' + id);
  cat.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.category').forEach(c => {
    if (open) c.classList.add('open'); else c.classList.remove('open');
  });
}

function toggleProblem(key, checked, catId) {
  if (checked) solved[key] = true; else delete solved[key];
  saveProgress();
  // Update UI
  const prob = document.querySelector('[data-key="' + key + '"]');
  if (prob) prob.classList.toggle('solved', checked);
  updateCategoryProgress(catId);
  updateGlobalProgress();
}

function toggleFlag(key) {
  if (flagged[key]) delete flagged[key]; else flagged[key] = true;
  saveProgress();
  const prob = document.querySelector('[data-key="' + key + '"]');
  if (prob) {
    prob.classList.toggle('flagged', !!flagged[key]);
    const btn = prob.querySelector('.flag-btn');
    if (btn) btn.classList.toggle('active', !!flagged[key]);
  }
}

function updateCategoryProgress(catId) {
  const cat = DATA.find(c => c.id === catId);
  if (!cat) return;
  const count = cat.problems.filter(p => solved[getProblemKey(catId, p.url)]).length;
  const pct = Math.round((count / cat.problems.length) * 100);
  const isComplete = count === cat.problems.length;
  const el = document.getElementById('cat-' + catId);
  if (!el) return;
  const progSpan = el.querySelector('.category-progress span');
  const bar = el.querySelector('.cat-bar-fill');
  if (progSpan) progSpan.textContent = count + ' / ' + cat.problems.length;
  if (bar) {
    bar.style.width = pct + '%';
    bar.classList.toggle('complete', isComplete);
  }
}

function updateGlobalProgress() {
  let total = 0, solvedN = 0;
  let easy = 0, medium = 0, hard = 0, easyS = 0, medS = 0, hardS = 0;
  DATA.forEach(cat => {
    cat.problems.forEach(p => {
      total++;
      const key = getProblemKey(cat.id, p.url);
      const dl = p.d.toLowerCase();
      if (dl === 'easy') { easy++; if (solved[key]) easyS++; }
      else if (dl === 'medium') { medium++; if (solved[key]) medS++; }
      else { hard++; if (solved[key]) hardS++; }
      if (solved[key]) solvedN++;
    });
  });
  document.getElementById('globalSolved').textContent = solvedN;
  document.getElementById('globalPct').textContent = Math.round((solvedN/total)*100) + '%';
  document.getElementById('globalBar').style.width = ((solvedN/total)*100) + '%';
  document.getElementById('diffCounts').innerHTML =
    '<div class="diff-stat"><span class="diff-dot easy"></span> Easy ' + easyS + '/' + easy + '</div>' +
    '<div class="diff-stat"><span class="diff-dot medium"></span> Medium ' + medS + '/' + medium + '</div>' +
    '<div class="diff-stat"><span class="diff-dot hard"></span> Hard ' + hardS + '/' + hard + '</div>';
}

// Filtering
function toggleFilter(diff) {
  diffFilters[diff] = !diffFilters[diff];
  const btn = document.querySelector('.btn-filter[data-diff="' + diff + '"]');
  if (btn) btn.classList.toggle('active', diffFilters[diff]);
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.problem').forEach(p => {
    const name = (p.getAttribute('data-name') || '').toLowerCase();
    const diff = p.getAttribute('data-diff');
    const matchesSearch = !q || name.includes(q);
    const matchesDiff = diffFilters[diff];
    p.style.display = (matchesSearch && matchesDiff) ? '' : 'none';
  });
  // Auto-open categories with visible problems if searching or filtering
  const isActiveFilter = !diffFilters.easy || !diffFilters.medium || !diffFilters.hard || q;
  if (isActiveFilter) {
    document.querySelectorAll('.category').forEach(cat => {
      const visible = cat.querySelectorAll('.problem[style=""],.problem:not([style])');
      const hasMatch = Array.from(visible).some(p => p.style.display !== 'none');
      if (hasMatch) cat.classList.add('open'); else cat.classList.remove('open');
    });
  }
}

// Random Picker
function pickRandom() {
  const unsolved = [];
  document.querySelectorAll('.problem:not(.solved)').forEach(p => {
    if (p.style.display !== 'none') unsolved.push(p);
  });
  if (unsolved.length === 0) {
    showToast('No unsolved problems visible!');
    return;
  }
  const randomProb = unsolved[Math.floor(Math.random() * unsolved.length)];
  const cat = randomProb.closest('.category');
  if (cat && !cat.classList.contains('open')) cat.classList.add('open');
  
  randomProb.scrollIntoView({ behavior: 'smooth', block: 'center' });
  randomProb.classList.remove('highlight');
  void randomProb.offsetWidth; // trigger reflow
  randomProb.classList.add('highlight');
}

// Share via URL hash
function shareProgress() {
  const keys = Object.keys(solved);
  if (keys.length === 0) { showToast('Nothing to share yet!'); return; }
  // Compact encoding: store indices
  const indices = [];
  DATA.forEach(cat => {
    cat.problems.forEach((p, pi) => {
      const key = getProblemKey(cat.id, p.url);
      if (solved[key]) indices.push(cat.id + '-' + pi);
    });
  });
  const encoded = btoa(indices.join(','));
  const url = location.origin + location.pathname + '#' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    showToast('Share URL copied to clipboard!');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Share URL copied to clipboard!');
  });
}

function loadFromHash() {
  if (!location.hash || location.hash.length < 2) return;
  try {
    const decoded = atob(location.hash.slice(1));
    const pairs = decoded.split(',');
    const newSolved = {};
    pairs.forEach(pair => {
      const [catId, pi] = pair.split('-').map(Number);
      const cat = DATA.find(c => c.id === catId);
      if (cat && cat.problems[pi]) {
        newSolved[getProblemKey(catId, cat.problems[pi].url)] = true;
      }
    });
    if (Object.keys(newSolved).length > 0) {
      // Merge with existing
      Object.assign(solved, newSolved);
      saveProgress();
      renderCategories();
      updateGlobalProgress();
      showToast('Loaded ' + Object.keys(newSolved).length + ' solved problems from shared link!');
      history.replaceState(null, '', location.pathname);
    }
  } catch(e) {}
}

// Reset
function confirmReset() {
  document.getElementById('resetModal').classList.add('show');
}
function closeModal() {
  document.getElementById('resetModal').classList.remove('show');
}
function resetAll() {
  solved = {};
  localStorage.removeItem(KEY);
  closeModal();
  renderCategories();
  updateGlobalProgress();
  showToast('All progress has been reset');
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Boot
init();
</script>
